services:
  db:
    image: postgres:17
    container_name: library_db
    restart: always
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c listen_addresses='*' -c log_destination='stderr'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - backend

  api:
    build: .
    container_name: library_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://library_user:123456@db:5432/library_db

    depends_on:
      db:
        condition: service_healthy

    command: >
      bash -c "
        echo 'Waiting for database...' &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

    volumes:
      - .:/app
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
